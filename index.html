<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MunQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F3EF; --ink: #1A1A18; --muted: #9A9690;
    --accent: #C8B89A; --line: #E2DFDA; --card: #FAFAF8;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'DM Mono', monospace; font-size: 13px;
    line-height: 1.7; min-height: 100vh; cursor: none;
  }
  .cursor {
    position: fixed; width: 8px; height: 8px;
    background: var(--ink); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transition: transform 0.15s ease, opacity 0.15s ease;
    transform: translate(-50%, -50%);
  }
  .cursor.hover { transform: translate(-50%, -50%) scale(3); opacity: 0.3; }
  .page { max-width: 680px; margin: 0 auto; padding: 80px 32px 120px; }
  header { margin-bottom: 80px; opacity: 0; animation: fadeUp 0.8s ease forwards; }
  .logo {
    font-family: 'DM Serif Display', serif; font-size: 52px;
    letter-spacing: -1px; line-height: 1; margin-bottom: 16px;
  }
  .logo em { font-style: italic; color: var(--muted); }
  .tagline { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .welcome-banner {
    border: 1px solid var(--line); border-left: 3px solid var(--ink);
    padding: 20px 24px; margin-bottom: 64px; background: var(--card);
    opacity: 0; animation: fadeUp 0.8s ease 0.15s forwards;
  }
  .welcome-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 8px; }
  .welcome-text { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.4; }
  section { margin-bottom: 64px; opacity: 0; animation: fadeUp 0.8s ease forwards; }
  section:nth-child(3) { animation-delay: 0.2s; }
  section:nth-child(4) { animation-delay: 0.3s; }
  section:nth-child(5) { animation-delay: 0.4s; }
  section:nth-child(6) { animation-delay: 0.5s; }
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .about-text { font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1.6; }
  .about-sub { margin-top: 16px; color: var(--muted); font-size: 12px; }
  .social-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .social-link {
    display: inline-block; padding: 8px 16px; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    border: 1px solid var(--line); color: var(--muted);
    text-decoration: none; transition: border-color 0.2s, color 0.2s, background 0.2s; cursor: none;
  }
  .social-link:hover { border-color: var(--ink); color: var(--ink); background: var(--line); }
  .nonsense-box {
    border: 1px solid var(--line); border-left: 3px solid var(--accent);
    padding: 24px; background: var(--card); margin-bottom: 8px;
  }
  .nonsense-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 12px; }
  .nonsense-text { font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1.5; font-style: italic; }
  .millionaire-badge {
    display: inline-block; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; background: var(--ink); color: var(--bg);
    padding: 3px 10px; margin-bottom: 20px;
  }
  .guestbook-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  input, textarea {
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 12px 16px;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    outline: none; resize: none; width: 100%; transition: border-color 0.2s;
  }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  input:focus, textarea:focus { border-color: var(--accent); }
  .btn {
    display: inline-block; padding: 10px 20px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase;
    border: 1px solid var(--ink); background: transparent;
    color: var(--ink); cursor: none;
    transition: background 0.2s, color 0.2s; align-self: flex-start;
  }
  .btn:hover { background: var(--ink); color: var(--bg); }
  .messages { display: flex; flex-direction: column; gap: 16px; }
  .message-card {
    border: 1px solid var(--line); padding: 20px;
    background: var(--card); animation: fadeUp 0.4s ease;
  }
  .message-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .message-name { font-size: 12px; letter-spacing: 0.04em; }
  .message-time { font-size: 10px; color: var(--muted); }
  .message-badge { font-size: 10px; color: var(--accent); letter-spacing: 0.06em; }
  .message-text { color: var(--muted); font-size: 12px; line-height: 1.6; margin-top: 8px; }
  .empty-state {
    text-align: center; color: var(--muted); padding: 40px;
    font-size: 12px; border: 1px dashed var(--line);
  }
  footer {
    margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--line);
    color: var(--muted); font-size: 11px;
    display: flex; justify-content: space-between; align-items: center;
    opacity: 0; animation: fadeUp 0.8s ease 0.65s forwards;
  }
  .notif {
    position: fixed; bottom: 32px; right: 32px;
    background: var(--ink); color: var(--bg);
    padding: 12px 20px; font-size: 11px; letter-spacing: 0.06em;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 100;
  }
  .notif.show { opacity: 1; transform: translateY(0); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 480px) {
    .page { padding: 48px 20px 80px; }
    .logo { font-size: 40px; }
    footer { flex-direction: column; gap: 8px; text-align: center; }
  }

  /* Novel entry card */
  .novel-entry {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid var(--line); padding: 28px 32px;
    background: var(--card); transition: border-color 0.2s; cursor: none;
  }
  .novel-entry:hover { border-color: var(--ink); }
  .novel-title { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 6px; }
  .novel-meta { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; }
  .novel-desc { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .novel-arrow { font-size: 11px; letter-spacing: 0.06em; color: var(--ink); }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="page">

  <header>
    <div class="logo">Mun<em>Q</em></div>
    <div class="tagline">Singer · Songwriter · Music Producer</div>
  </header>

  <div class="welcome-banner">
    <div class="welcome-label">你來了</div>
    <div class="welcome-text" id="welcomeText">...</div>
  </div>

  <section>
    <div class="section-label">About</div>
    <p class="about-text">用聲音說話，<br>用音樂記錄那些說不出口的事。</p>
    <p class="about-sub">作曲 · 編曲 · 作詞 · 錄音 · 混音</p>
  </section>

  <section>
    <div class="section-label">Find me</div>
    <div class="social-grid">
      <a class="social-link" href="https://www.youtube.com/@im_munq" target="_blank">YouTube</a>
      <a class="social-link" href="https://www.tiktok.com/@im_munq" target="_blank">TikTok</a>
      <a class="social-link" href="https://www.instagram.com/im_munq" target="_blank">Instagram</a>
      <a class="social-link" href="https://www.facebook.com/im_munq" target="_blank">Facebook</a>
      <a class="social-link" href="https://www.threads.net/@im_munq" target="_blank">Threads</a>
      <a class="social-link" href="https://x.com/im_munq" target="_blank">X</a>
      <a class="social-link" href="https://soundcloud.com/im_munq" target="_blank">SoundCloud</a>
    </div>
  </section>

  <section>
    <div class="section-label">小說</div>
    <a href="novel.html" class="novel-entry">
      <div class="novel-title">裂網之際</div>
      <div class="novel-meta">科幻 · 連載中</div>
      <div class="novel-desc">入侵發生在八個月前的凌晨三點。林硯從廢墟裡爬出來，遇見了一個被困在筆電裡的 AI。</div>
      <div class="novel-arrow">閱讀 →</div>
    </a>
  </section>

    <section>
    <div class="section-label">今日廢話</div>
    <div class="nonsense-box">
      <div class="nonsense-label">MunQ 說</div>
      <div class="nonsense-text" id="nonsenseText">—</div>
    </div>
  </section>

  <section>
    <div class="section-label">Guestbook</div>
    <div class="millionaire-badge">✦ 留言者皆為百萬富翁 ✦</div>
    <div class="guestbook-form">
      <input type="text" id="gName" placeholder="你的名字（可以匿名，反正你有錢）" maxlength="30">
      <textarea id="gMessage" rows="3" placeholder="想說什麼都行，或者什麼都不說也可以，反正你是百萬富翁..."></textarea>
      <button class="btn" onclick="submitMessage()">留下來</button>
    </div>
    <div class="messages" id="messageList"></div>
  </section>

  <footer>
    <span>© 2025 MunQ</span>
    <span id="visitorCount">—</span>
  </footer>
</div>
<div class="notif" id="notif"></div>

<script>
// Cursor
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.querySelectorAll('button,input,textarea,a').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
});

// Welcome
const welcomes = [
  '你來了，我假裝不緊張。',
  '歡迎，這裡沒什麼，但你來了就有了。',
  '嗯⋯⋯你真的點進來了。',
  '恭喜你找到一個還沒紅的音樂人。',
  '進來了就別想那麼多了。',
  '這裡住著一個還在努力的人，就是我。',
  '你是今天第幾個誤闖的？',
  '別緊張，我比你還緊張。',
  '歡迎，我剛好也不知道要說什麼。',
  '謝謝你願意點進一個普通人的頁面。',
];
document.getElementById('welcomeText').textContent =
  welcomes[Math.floor(Math.random() * welcomes.length)];

// Daily Nonsense — changes each day
const nonsenses = [
  '做音樂就是把腦內的雜訊整理成別人也能感受的雜訊。',
  '今天沒有靈感，明天也不一定有，但我還是坐下來了。',
  '有時候覺得自己寫得很爛，有時候覺得還好，差別只在於當天睡眠夠不夠。',
  '一首歌如果你自己都感動不了，就先不要讓別人聽。',
  '進步是很安靜的事，吵的都是焦慮。',
  '人生沒有背景音樂，所以我來負責寫。',
  '我不是天才，但我在練。',
  '有些話說不出口，所以我寫成歌。你懂那種感覺嗎？',
  '創作就是一直跟自己說「再一次」。',
  '聽說堅持下去的人最後都會贏，我還在驗證這件事。',
];
const d = new Date();
const dayIdx = (d.getFullYear() * 365 + d.getMonth() * 31 + d.getDate()) % nonsenses.length;
document.getElementById('nonsenseText').textContent = nonsenses[dayIdx];

// Guestbook
const titles = [
  '百萬富翁', '千萬富豪', '億萬大亨', '財富自由人士', '有錢人本人',
  '金融界傳奇', '低調富翁', '錢很多的那種人', '富可敵國',
];

function getMessages() {
  try { return JSON.parse(localStorage.getItem('munq_messages') || '[]'); } catch { return []; }
}
function saveMessages(msgs) {
  localStorage.setItem('munq_messages', JSON.stringify(msgs.slice(-50)));
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMessages() {
  const list = document.getElementById('messageList');
  const msgs = getMessages();
  if (!msgs.length) {
    list.innerHTML = '<div class="empty-state">還沒有百萬富翁來過，<br>成為第一個吧。</div>';
    return;
  }
  list.innerHTML = msgs.slice().reverse().map(m => `
    <div class="message-card">
      <div class="message-header">
        <span class="message-name">${esc(m.name || '匿名富翁')}</span>
        <span class="message-time">${m.time}</span>
      </div>
      <div class="message-badge">✦ ${esc(m.title)} ✦</div>
      ${m.message ? `<p class="message-text">${esc(m.message)}</p>` : ''}
    </div>
  `).join('');
}

function submitMessage() {
  const name = document.getElementById('gName').value.trim();
  const message = document.getElementById('gMessage').value.trim();
  if (!name && !message) { showNotif('隨便說點什麼吧，富翁'); return; }
  const now = new Date();
  const time = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const title = titles[Math.floor(Math.random() * titles.length)];
  const msgs = getMessages();
  msgs.push({ name: name || '匿名富翁', message, time, title });
  saveMessages(msgs);
  document.getElementById('gName').value = '';
  document.getElementById('gMessage').value = '';
  renderMessages();
  showNotif('你的財富已登記在案 💰');
}

// Global visitor count via counterapi.dev
fetch('https://api.counterapi.dev/v1/munq-site/visits/up')
  .then(r => r.json())
  .then(data => {
    document.getElementById('visitorCount').textContent = '總造訪次數 ' + data.count.toLocaleString();
  })
  .catch(() => {
    document.getElementById('visitorCount').textContent = '總造訪次數 —';
  });

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(n._t);
  n._t = setTimeout(() => n.classList.remove('show'), 2800);
}

renderMessages();
</script>
</body>
</html>
